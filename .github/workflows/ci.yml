name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Rust ${{ matrix.rust }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable, "1.85.0"]  # MSRV
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-features

      - name: Test
        run: cargo test --workspace --all-features

      - name: Clippy
        if: matrix.rust == 'stable'
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Format check
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest hypothesis

      - name: Run Python tests
        run: cd python && python -m pytest tests/ -v

  cross-language:
    name: Cross-Language Interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install pytest hypothesis

      - name: Build Rust CLI
        run: cargo build -p surp-cli --release

      - name: Rust → Python interop
        run: |
          echo '{"name":"Alice","age":30,"active":true}' > /tmp/test.json
          cargo run -p surp-cli --release -- from-json /tmp/test.json -o /tmp/test.surp
          cd python && python -c "
          from surp.decoder import Decoder
          with open('/tmp/test.surp', 'rb') as f:
              data = f.read()
          dec = Decoder(data)
          result = dec.decode_next().to_python()
          assert result == {'name': 'Alice', 'age': 30, 'active': True}, f'FAIL: {result}'
          print('Rust → Python: OK')
          "

      - name: Python → Rust interop
        run: |
          cd python && python -c "
          from surp.encoder import Encoder
          from surp.value import Value
          enc = Encoder()
          enc.encode_value(Value.from_python({'greeting': 'hello', 'count': 42}))
          with open('/tmp/py_test.surp', 'wb') as f:
              f.write(enc.finish())
          print('Python encode: OK')
          "
          cargo run -p surp-cli --release -- to-json /tmp/py_test.surp

  bench-smoke:
    name: Benchmark Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks (smoke)
        run: cargo bench -p surp-core -- --test

  fuzz-smoke:
    name: Fuzz Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Fuzz decode (30s)
        run: cargo +nightly fuzz run fuzz_decode -- -max_total_time=30 -max_len=4096

      - name: Fuzz roundtrip (30s)
        run: cargo +nightly fuzz run fuzz_roundtrip -- -max_total_time=30 -max_len=4096

      - name: Fuzz text (30s)
        run: cargo +nightly fuzz run fuzz_text -- -max_total_time=30 -max_len=4096

      - name: Fuzz varint (30s)
        run: cargo +nightly fuzz run fuzz_varint -- -max_total_time=30 -max_len=4096

      - name: Fuzz block (30s)
        run: cargo +nightly fuzz run fuzz_block -- -max_total_time=30 -max_len=4096

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit dependencies
        run: cargo audit
