# ---------------------------------------------------------------------------
# CI workflow: build surp-native wheels for all platforms and publish to PyPI
#
# Triggers:
#   - Push tag matching "python-v*" (e.g. python-v1.1.0) → full build + PyPI publish
#   - Manual workflow_dispatch → build only (publish skipped unless release flag set)
#   - Pull requests touching surp-python/ → build only (smoke test)
#
# Matrix:
#   - Linux   x86_64 + aarch64  (manylinux, musllinux)
#   - macOS   x86_64 + ARM64
#   - Windows x86_64
#   - CPython 3.9 – 3.14
# ---------------------------------------------------------------------------

name: Python Publish

on:
  push:
    tags:
      - "python-v*"
  pull_request:
    paths:
      - "surp-python/**"
      - "surp-core/**"
      - ".github/workflows/python-publish.yml"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI after build"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Maturin picks up Cargo.toml from manifest-path in pyproject.toml,
  # but the workspace root must be discoverable.
  CARGO_WORKSPACE_DIR: ${{ github.workspace }}

jobs:
  # -----------------------------------------------------------------------
  # Linux wheels (x86_64 + aarch64, glibc + musl)
  # -----------------------------------------------------------------------
  linux:
    name: Linux (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Copy README for maturin
        run: cp README.md surp-python/README.md

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"
          manylinux: auto
          working-directory: surp-python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: surp-python/dist

  # -----------------------------------------------------------------------
  # macOS wheels (x86_64 + ARM64, universal2)
  # -----------------------------------------------------------------------
  macos:
    name: macOS (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-latest      # Intel x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest      # Apple Silicon (cross-compiled)
    steps:
      - uses: actions/checkout@v4

      - name: Copy README for maturin
        run: cp README.md surp-python/README.md

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"
          working-directory: surp-python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: surp-python/dist

  # -----------------------------------------------------------------------
  # Windows wheels (x86_64)
  # -----------------------------------------------------------------------
  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy README for maturin
        run: copy README.md surp-python\README.md
        shell: cmd

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist --find-interpreter
          sccache: "true"
          working-directory: surp-python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: surp-python/dist

  # -----------------------------------------------------------------------
  # Source distribution (sdist) — fallback for unsupported platforms
  # -----------------------------------------------------------------------
  sdist:
    name: Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy README for maturin
        run: cp README.md surp-python/README.md

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: surp-python

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: surp-python/dist

  # -----------------------------------------------------------------------
  # Smoke test — install built wheel and run a quick sanity check
  # -----------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python }})
    needs: [linux, macos, windows]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
            artifact: wheels-linux-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            python: "3.12"
            artifact: wheels-linux-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            python: "3.13"
            artifact: wheels-linux-x86_64-unknown-linux-gnu
          - os: macos-14
            python: "3.12"
            artifact: wheels-macos-aarch64-apple-darwin
          - os: windows-latest
            python: "3.12"
            artifact: wheels-windows-x86_64
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Install wheel
        run: pip install --find-links dist --no-index --force-reinstall surp-native

      - name: Smoke test
        run: |
          python -c "
          import _surp_native as cn
          import os, tempfile

          # Module version
          assert hasattr(cn, '__version__'), 'missing __version__'

          # Encode / decode roundtrip
          obj = {'name': 'Alice', 'age': 30, 'active': True}
          data = cn.encode(obj)
          assert isinstance(data, bytes) and len(data) > 0
          decoded = cn.decode(data)
          assert decoded == obj, 'roundtrip failed: ' + repr(decoded)

          # Encoder class
          enc = cn.Encoder()
          enc.encode([1, 2, 3])
          buf = enc.finish()
          assert cn.decode(buf) == [1, 2, 3]

          # Decoder class
          dec = cn.SurpDecoder(data)
          vals = dec.decode_all()
          assert vals[0] == obj

          # File I/O roundtrip
          tmp = os.path.join(tempfile.gettempdir(), 'surp_smoke.surp')
          cn.encode_to_file(obj, tmp)
          assert os.path.isfile(tmp)
          decoded2 = cn.decode_from_file(tmp)
          assert decoded2 == obj, 'file roundtrip failed: ' + repr(decoded2)
          os.remove(tmp)

          # Encoder finish_to_file
          enc2 = cn.Encoder()
          enc2.encode({'x': 42})
          enc2.finish_to_file(tmp)
          assert cn.decode_from_file(tmp) == {'x': 42}
          os.remove(tmp)

          # Pretty-print
          text = cn.pretty_print(obj)
          assert 'Alice' in text

          import sys
          print('All smoke tests passed (Python ' + sys.version + ')')
          "

  # -----------------------------------------------------------------------
  # Publish to PyPI (only on tag push or manual trigger with publish=true)
  # -----------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [linux, macos, windows, sdist, test]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/python-v'))
      || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    environment:
      name: pypi
      url: https://pypi.org/project/surp-native/
    permissions:
      id-token: write   # for trusted publishing via OIDC
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List distribution files
        run: ls -lhR dist/

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
